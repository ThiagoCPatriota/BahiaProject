<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Município — Bahia</title>
  <link rel="stylesheet" href="municipio.css" />
</head>
<body>

  <header id="cabecalho">
    <div class="logo-faculdade">
      <img src="ifpe.jpeg" alt="Logo da Faculdade" />
    </div>
    <h1>Portal Cultural da Bahia</h1>
  </header>

  <main id="conteudo-municipio">

    <aside id="sidebar">
      <a href="index.html" class="btn-voltar">← Voltar ao mapa</a>

      <div id="info-fixa">
        <p id="regiao-header"></p>
        <h2 id="nome-header"></h2>
        <p id="codigo-ibge"></p>
      </div>
    </aside>

    <section id="conteudo-principal">

      <div id="galeria">
        <div class="img-slot grande" id="slot-0">
          <div class="shimmer"></div>
          <img alt="" />
        </div>
        <div class="img-slot" id="slot-1">
          <div class="shimmer"></div>
          <img alt="" />
        </div>
        <div class="img-slot" id="slot-2">
          <div class="shimmer"></div>
          <img alt="" />
        </div>
      </div>

      <article id="cultura-artigo">
        <h3>Cultura &amp; História</h3>
        <div id="cultura-texto">
          <div class="loader"><span></span><span></span><span></span></div>
        </div>
      </article>

    </section>

  </main>

  <script src="municipio.js"></script>
</body>
</html>
